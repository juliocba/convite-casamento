<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<title>Júlio & Hellen</title>

<style>
body {
  margin: 0;
  background: #f4f4f4;
  font-family: 'Montserrat', sans-serif;
  text-align: center;
  color: #6f8fa6;
}

/* TOPO */
.topo {
  padding: 40px 20px 10px;
}

/* IMAGEM MÃOS */
.maos img {
  width: 120px;
  opacity: 0.9;
}

/* NOMES */
.nomes {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
  margin-top: 15px;
}

/* FOTO COM FADE */
.foto-container {
  position: relative;
  margin-top: 20px;
}

.foto-container img {
  width: 100%;
  max-width: 420px;
  border-radius: 0;
}

/* FADE TOP */
.fade-top {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(#f4f4f4, transparent);
}

/* FADE BOTTOM */
.fade-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 150px;
  background: linear-gradient(transparent, #f4f4f4);
}

/* BOTÕES SOBRE A FOTO */
.botoes {
  position: absolute;
  bottom: 20px;
  width: 100%;
}

.btn {
  display: block;
  width: 85%;
  max-width: 320px;
  margin: 10px auto;
  padding: 12px;

  border-radius: 30px;
  border: 1px solid #9bb3c5;

  background: rgba(255,255,255,0.9);
  color: #6f8fa6;
  text-decoration: none;
  font-size: 13px;
}

/* TEXTO FINAL */
.clique {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="topo">

<div class="maos">
  <img src="maos.png" alt="Mãos dadas">
</div>

<div class="nomes">
  Júlio e Hellen
</div>

</div>

<div class="foto-container">

<img src="foto-casal.jpeg">

<div class="fade-top"></div>
<div class="fade-bottom"></div>

<div class="botoes">

<a class="btn" href="https://www.google.com/maps/place/Buffet+Ana+Conceito/@-3.7376218,-38.5426611,1085m/data=!3m2!1e3!4b1!4m6!3m5!1s0x7c74908d505a80d:0x9fb3872fccc55fcd!8m2!3d-3.7376272!4d-38.5400862!16s%2Fg%2F1yhbl8lwn?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D" target="_blank">
📍 LOCALIZAÇÃO
</a>

<a class="btn" href="https://forms.gle/VYU7MDo4SPLDYaYR6" target="_blank">
✔ CONFIRME SUA PRESENÇA
</a>

<a class="btn" href="https://juliocba.github.io/presente-casamento/" target="_blank">
🎁 SUGESTÃO DE PRESENTE
</a>

<div class="clique">CLIQUE NOS BOTÕES</div>

</div>

</div>

</body>
</html>
