<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<title>Júlio & Hellen</title>

<style>
:root{
  --azul:#7FA1B8;
  --bg:#f4f4f4;
}

body{
  margin:0;
  background:#ddd;
  font-family:'Montserrat',sans-serif;
}

.app{
  max-width:420px;
  margin:auto;
  background:var(--bg);
  min-height:100vh;
  box-shadow:0 0 30px rgba(0,0,0,0.2);
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}

/* TOPO */
.topo{
  text-align:center;
  padding:30px 20px 10px;
  color:var(--azul);
}

.maos svg{
  width:120px;
  stroke:var(--azul);
  stroke-width:1.8;
  fill:none;
}

.nomes{
  font-family:'Great Vibes',cursive;
  font-size:42px;
}

/* FOTO */
.foto-container{
  position:relative;
}

.foto-container img{
  width:100%;
}

.fade-top{
  position:absolute;
  top:0;
  width:100%;
  height:120px;
  background:linear-gradient(var(--bg),transparent);
}

.fade-bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:160px;
  background:linear-gradient(transparent,var(--bg));
}

/* BOTÕES */
.botoes{
  position:absolute;
  bottom:20px;
  width:100%;
}

.btn{
  display:block;
  width:85%;
  margin:10px auto;
  padding:12px;
  border-radius:30px;
  border:1px solid var(--azul);
  text-decoration:none;
  color:var(--azul);
  background:rgba(255,255,255,0.95);
  font-size:13px;

  transition:0.2s;
}

/* ANIMAÇÃO BOTÃO */
.btn:active{
  transform:scale(0.96);
  box-shadow:0 2px 8px rgba(0,0,0,0.2) inset;
}

/* LEMBRE-SE */
.lembre{
  text-align:center;
  padding:40px 20px;
  color:var(--azul);
}

.lembre h2{
  font-family:'Great Vibes',cursive;
  font-size:32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:20px;
}

.item{
  font-size:11px;
}

/* ICONES PADRÃO */
.icon{
  width:55px;
  margin:auto;
  margin-bottom:5px;
  stroke:var(--azul);
  stroke-width:1.8;
  fill:none;
}
</style>
</head>

<body>

<div class="app">

<!-- TOPO -->
<div class="topo">

<div class="maos">
<svg viewBox="0 0 100 100">
  <path d="M20 60 Q40 40 50 60 T80 60"/>
</svg>
</div>

<div class="nomes">Júlio e Hellen</div>

</div>

<!-- FOTO -->
<div class="foto-container">
<img src="foto-casal.jpeg">

<div class="fade-top"></div>
<div class="fade-bottom"></div>

<div class="botoes">

<a class="btn" href="https://www.google.com/maps/place/Buffet+Ana+Conceito" target="_blank">
Localização
</a>

<a class="btn" href="https://forms.gle/VYU7MDo4SPLDYaYR6" target="_blank">
Confirmar presença
</a>

<a class="btn" href="https://juliocba.github.io/presente-casamento/" target="_blank">
Sugestão de presente
</a>

</div>

</div>

<!-- LEMBRE-SE -->
<div class="lembre">

<h2>Lembre-se de:</h2>

<div class="grid">

<!-- CALENDÁRIO -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<rect x="3" y="5" width="18" height="16" rx="2"/>
<line x1="3" y1="9" x2="21" y2="9"/>
</svg>
Confirmar sua presença
</div>

<!-- RELÓGIO -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="12" x2="12" y2="7"/>
<line x1="12" y1="12" x2="16" y2="12"/>
</svg>
Ser pontual
</div>

<!-- CASAMENTO -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<circle cx="8" cy="10" r="2"/>
<circle cx="16" cy="10" r="2"/>
<path d="M5 20 Q12 15 19 20"/>
</svg>
Cerimônia às 16h
</div>

<!-- TAÇAS -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<path d="M6 4 L10 12 L6 12 Z"/>
<path d="M18 4 L14 12 L18 12 Z"/>
</svg>
Aproveitar bastante
</div>

<!-- CÂMERA -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<rect x="3" y="7" width="18" height="12" rx="2"/>
<circle cx="12" cy="13" r="3"/>
</svg>
Tirar uma foto com os noivos
</div>

<!-- DESPEDIDA -->
<div class="item">
<svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="8" r="3"/>
<path d="M6 20 Q12 14 18 20"/>
</svg>
Não sair sem despedir
</div>

</div>

</div>

</div>

</body>
</html>
