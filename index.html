<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<title>Júlio & Hellen</title>

<style>
:root{
  --azul:#7FA1B8;
  --bg:#f4f4f4;
}

body{
  margin:0;
  background:#ddd;
  font-family:'Montserrat',sans-serif;
}

.app{
  max-width:420px;
  margin:auto;
  background:var(--bg);
  min-height:100vh;
  box-shadow:0 0 30px rgba(0,0,0,0.2);
}

/* TOPO */
.topo{
  text-align:center;
  padding:30px 20px;
  color:var(--azul);
}

.maos img{
  width:140px;
}

.nomes{
  font-family:'Great Vibes',cursive;
  font-size:42px;
}

/* FOTO */
.foto-container{
  position:relative;
}

.foto-container img{
  width:100%;
}

/* FADE */
.fade-top{
  position:absolute;
  top:0;
  width:100%;
  height:120px;
  background:linear-gradient(var(--bg),transparent);
}

.fade-bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:160px;
  background:linear-gradient(transparent,var(--bg));
}

/* BOTÕES */
.botoes{
  position:absolute;
  bottom:20px;
  width:100%;
}

.btn{
  display:flex;
  align-items:center;
  gap:10px;

  width:85%;
  margin:10px auto;
  padding:12px 15px;

  border-radius:30px;
  border:1px solid var(--azul);

  text-decoration:none;
  color:var(--azul);
  background:rgba(255,255,255,0.95);
  font-size:13px;

  transition:0.25s;
}

/* ICONE BOTÃO */
.btn img{
  width:18px;
}

/* HOVER (PC) */
.btn:hover{
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  transform:translateY(-2px);
}

/* CLICK (MOBILE) */
.btn:active{
  transform:scale(0.96);
}

/* LEMBRE-SE */
.lembre{
  text-align:center;
  padding:40px 20px;
  color:var(--azul);
}

.lembre h2{
  font-family:'Great Vibes',cursive;
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  margin-top:20px;
}

.item{
  font-size:11px;
}

/* ICONES GRID */
.item img{
  width:55px;
  margin-bottom:5px;
}
</style>
</head>

<body>

<div class="app">

<!-- TOPO -->
<div class="topo">
  <div class="maos">
    <img src="maos.png">
  </div>

  <div class="nomes">Júlio e Hellen</div>
</div>

<!-- FOTO -->
<div class="foto-container">

<img src="foto-casal.jpeg">

<div class="fade-top"></div>
<div class="fade-bottom"></div>

<div class="botoes">

<a class="btn" href="https://www.google.com/maps/place/Buffet+Ana+Conceito" target="_blank">
  <img src="calendario.png"> Localização
</a>

<a class="btn" href="https://forms.gle/VYU7MDo4SPLDYaYR6" target="_blank">
  <img src="relogio.png"> Confirmar presença
</a>

<a class="btn" href="https://juliocba.github.io/presente-casamento/" target="_blank">
  <img src="aproveite.png"> Sugestão de presente
</a>

</div>

</div>

<!-- LEMBRE-SE -->
<div class="lembre">

<h2>Lembre-se de:</h2>

<div class="grid">

<div class="item">
<img src="calendario.png">
Confirmar sua presença
</div>

<div class="item">
<img src="relogio.png">
Ser pontual
</div>

<div class="item">
<img src="cerimonia.png">
Cerimônia às 16h
</div>

<div class="item">
<img src="aproveite.png">
Aproveitar bastante
</div>

<div class="item">
<img src="foto.png">
Tirar uma foto
</div>

<div class="item">
<img src="despedida.png">
Não sair sem despedir
</div>

</div>

</div>

</div>

</body>
</html>
